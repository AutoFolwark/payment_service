name: Fast Multi-arch Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  # Docker Hub repository name (the part after ${DOCKERHUB_USERNAME}/); used for build and push.
  IMAGE_REPO: payment_service
  # docker compose service name(s) in compose files (pull/up); may differ from IMAGE_REPO.
  # One image can back several containers: list multiple names separated by commas (optional spaces).
  # Example: auth_service or auth_api,auth_worker
  SERVICE_NAME: payment_service, payment_rpc_service
  IMAGE_TAG: ${{ github.ref_name == 'main' && 'main' || 'dev' }}
  CACHE_SCOPE: ${{ github.ref_name }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true

      - name: Cache poetry dependencies
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run tests
        run: |
          echo "Running tests..."
          poetry run pytest || ([ $? -eq 5 ] && echo "No tests found - continuing" || exit $?)

  build:
    needs: test
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            cache-tag: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            cache-tag: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPO }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPO }}:buildcache-${{ env.CACHE_SCOPE }}-${{ matrix.cache-tag }}
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPO }}:buildcache-${{ env.CACHE_SCOPE }}-${{ matrix.cache-tag }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.cache-tag }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_REPO }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail
          images=""
          for d in *; do
            images="$images $IMAGE_NAME@sha256:$d"
          done
          docker buildx imagetools create \
            -t "$IMAGE_NAME:$IMAGE_TAG" \
            -t "$IMAGE_NAME:${GITHUB_SHA}" \
            $images

  deploy:
    needs: merge
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    steps:
      # Use separate steps per branch so SSH credentials are never chosen via `&&`/`||` on
      # possibly empty secrets (undefined secrets are "" and would fall back incorrectly).
      - name: Redeploy ${{ env.SERVICE_NAME }} on production (Infisical)
        if: github.ref_name == 'main'
        uses: appleboy/ssh-action@v1.2.2
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          port: 22
          timeout: 300s
          command_timeout: 600s
          envs: INFISICAL_CLIENT_ID,INFISICAL_CLIENT_SECRET,INFISICAL_PROJECT_ID,DEPLOY_BRANCH,DEPLOY_PATH,SERVICE_NAME
          script: |
            set -e
            COMPOSE_FILE="prod/docker-compose.yml"
            INFISICAL_ENV="prod"
            [ -n "${DEPLOY_PATH:-}" ] || { echo "DEPLOY_PATH is unset"; exit 1; }
            cd "$DEPLOY_PATH" || exit 1
            export INFISICAL_TOKEN=$(infisical login --method=universal-auth --client-id="$INFISICAL_CLIENT_ID" --client-secret="$INFISICAL_CLIENT_SECRET" --domain=https://eu.infisical.com --silent --plain)
            if [ -z "$INFISICAL_TOKEN" ]; then
              echo "Infisical login failed or returned empty token"
              exit 2
            fi

            ic_run() {
              infisical run --projectId="$INFISICAL_PROJECT_ID" --env="$INFISICAL_ENV" --token="$INFISICAL_TOKEN" --domain=https://eu.infisical.com -- "$@"
            }

            # SERVICE_NAME: comma-separated list → space-separated args for docker compose
            SERVICES=$(printf '%s' "$SERVICE_NAME" | tr ',' ' ' | xargs)
            [ -n "$SERVICES" ] || { echo "SERVICE_NAME is empty"; exit 1; }

            ic_run sh -c "docker compose -f $COMPOSE_FILE pull $SERVICES"
            ic_run sh -c "docker compose -f $COMPOSE_FILE up -d $SERVICES"
            echo "Redeploy completed successfully for: $SERVICES"

      - name: Redeploy ${{ env.SERVICE_NAME }} on staging/demo (Infisical)
        if: github.ref_name == 'dev'
        uses: appleboy/ssh-action@v1.2.2
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          DEPLOY_BRANCH: ${{ github.ref_name }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SERVICE_NAME: ${{ env.SERVICE_NAME }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 300s
          command_timeout: 600s
          envs: INFISICAL_CLIENT_ID,INFISICAL_CLIENT_SECRET,INFISICAL_PROJECT_ID,DEPLOY_BRANCH,DEPLOY_PATH,SERVICE_NAME
          script: |
            set -e
            COMPOSE_FILE="demo/docker-compose.demo.yml"
            INFISICAL_ENV="staging"
            [ -n "${DEPLOY_PATH:-}" ] || { echo "DEPLOY_PATH is unset"; exit 1; }
            cd "$DEPLOY_PATH" || exit 1
            export INFISICAL_TOKEN=$(infisical login --method=universal-auth --client-id="$INFISICAL_CLIENT_ID" --client-secret="$INFISICAL_CLIENT_SECRET" --domain=https://eu.infisical.com --silent --plain)
            if [ -z "$INFISICAL_TOKEN" ]; then
              echo "Infisical login failed or returned empty token"
              exit 2
            fi

            ic_run() {
              infisical run --projectId="$INFISICAL_PROJECT_ID" --env="$INFISICAL_ENV" --token="$INFISICAL_TOKEN" --domain=https://eu.infisical.com -- "$@"
            }

            # SERVICE_NAME: comma-separated list → space-separated args for docker compose
            SERVICES=$(printf '%s' "$SERVICE_NAME" | tr ',' ' ' | xargs)
            [ -n "$SERVICES" ] || { echo "SERVICE_NAME is empty"; exit 1; }

            ic_run sh -c "docker compose -f $COMPOSE_FILE pull $SERVICES"
            ic_run sh -c "docker compose -f $COMPOSE_FILE up -d $SERVICES"
            echo "Redeploy completed successfully for: $SERVICES"

